<style>
:root {
  --bg: #0a0e1a; --bg2: #111827; --bg3: #1a2235; --border: #1e2d45;

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:13px; overflow-x:hidden; min-height:100vh; }

.ticker-name { color:var(--cyan); }
.price-up { color:var(--green); }
.price-dn { color:var(--red); }

.main { padding:16px; display:flex; flex-direction:column; gap:20px; }
.glass { background:rgba(17,24,39,0.7); backdrop-filter:blur(12px); border:1px solid rgba(30,45,69,0.6); border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,.5); }

.symbol-bar { display:flex; gap:10px; flex-wrap:wrap; background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:12px; }
.symbol-bar input, .symbol-bar select { background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:12px; color:var(--text); font-size:14px; }
.btn { border:none; border-radius:8px; padding:12px 20px; font-family:'Space Grotesk',sans-serif; font-weight:700; cursor:pointer; font-size:14px; transition:all .2s; }
.btn-primary { background:var(--blue); color:#fff; }
.btn-purple { background:var(--purple); color:#fff; }
.btn-orange { background:var(--orange); color:#fff; }

.chart-container { height:480px; background:var(--bg2); border-radius:16px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,.5); }
#chart { width:100%; height:100%; }

.panels-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; }
.panel { background:var(--bg2); border-radius:16px; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,.4); }
.panel-header { padding:14px 18px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }

.data-table { width:100%; border-collapse:collapse; }
.data-table td, .data-table th { padding:10px 16px; border-bottom:1px solid rgba(30,45,69,.5); }
.data-table th { color:var(--muted); font-weight:600; text-align:left; }

.consensus-bar { height:12px; border-radius:8px; background:var(--bg3); margin:8px 16px; overflow:hidden; }
.consensus-fill { height:100%; transition:width .6s cubic-bezier(0.34,1.56,0.64,1); }

.signal-log { max-height:340px; overflow-y:auto; }
.signal-item { padding:12px 18px; border-bottom:1px solid rgba(30,45,69,.5); display:flex; gap:12px; }
.signal-time { color:var(--muted); font-size:12px; white-space:nowrap; }
.sig-buy { color:var(--green); }
.sig-sell { color:var(--red); }
.sig-master { color:var(--gold); }

.toast-container { position:fixed; top:80px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:12px; }
.toast { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:16px 20px; min-width:280px; box-shadow:0 15px 35px rgba(0,0,0,.6); animation:toastIn .4s ease; }
@keyframes toastIn { from { transform:translateX(100px); opacity:0; } to { transform:translateX(0); opacity:1; } }

.ai-chat-box { height:420px; display:flex; flex-direction:column; }
.ai-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; }

@media(max-width:640px) { .main { padding:12px; gap:14px; } .panels-grid { grid-template-columns:1fr; } }

// ========== INDICATOR FONKSİYONLARI (tamamı dolu) ==========
function resample(bars, n) {
  const out = [];
  for (let i = 0; i < bars.length; i += n) {
    const chunk = bars.slice(i, i + n);
    if (!chunk.length) continue;
    out.push({
      t: chunk[0].t,
      o: chunk[0].o,
      h: Math.max(...chunk.map(b => b.h)),
      l: Math.min(...chunk.map(b => b.l)),
      c: chunk[chunk.length - 1].c,
      v: chunk.reduce((a, b) => a + b.v, 0)
    });
  }
  return out;
}
function sma(arr, len) { return arr.map((_,i)=>{ if(i<len-1) return null; let s=0; for(let j=i-len+1;j<=i;j++) s+=arr[j]; return s/len; }); }
function ema(arr, len) { const k=2/(len+1); const out=[]; let e=null; for(let i=0;i<arr.length;i++) { if(arr[i]===null){out.push(null);continue;} if(e===null) e=arr[i]; else e=arr[i]*k+e*(1-k); out.push(e); } return out; }
function atr(bars, len) { const tr = bars.map((b,i)=>{ if(i===0) return b.h-b.l; return Math.max(b.h-b.l, Math.abs(b.h-bars[i-1].c), Math.abs(b.l-bars[i-1].c)); }); return sma(tr, len); }
function stdev(arr, len) { return arr.map((_,i)=>{ if(i<len-1) return null; const sl=arr.slice(i-len+1,i+1).filter(v=>v!==null); if(!sl.length) return null; const m=sl.reduce((a,b)=>a+b,0)/sl.length; return Math.sqrt(sl.reduce((a,b)=>a+(b-m)**2,0)/sl.length); }); }
function highest(arr, len) { return arr.map((_,i)=>{ if(i<len-1) return null; return Math.max(...arr.slice(i-len+1,i+1).filter(v=>v!==null)); }); }
function lowest(arr, len) { return arr.map((_,i)=>{ if(i<len-1) return null; return Math.min(...arr.slice(i-len+1,i+1).filter(v=>v!==null)); }); }
function percentileLinear(arr, len, pct) { return arr.map((_,i)=>{ if(i<len-1) return null; const sl=[...arr.slice(i-len+1,i+1).filter(v=>v!==null)].sort((a,b)=>a-b); const idx=(pct/100)*(sl.length-1); const lo=Math.floor(idx), hi=Math.ceil(idx); return sl[lo]+(sl[hi]-sl[lo])*(idx-lo); }); }
function rsi(closes, len) { const out=[]; for(let i=0;i<closes.length;i++){ if(i<len){out.push(null);continue;} let gains=0,losses=0; for(let j=i-len+1;j<=i;j++){ const d=closes[j]-closes[j-1]; if(d>=0) gains+=d; else losses-=d; } const ag=gains/len, al=losses/len; out.push(al===0?100:100-(100/(1+ag/al))); } return out; }
function macd(closes, fast=12, slow=26, sig=9) { const ef=ema(closes,fast), es=ema(closes,slow); return ef.map((v,i)=>v!==null&&es[i]!==null?v-es[i]:null); }
function dmi(bars, diLen, smooth) { const trs=[], pDMs=[], mDMs=[]; for(let i=1;i<bars.length;i++){ const b=bars[i], pb=bars[i-1]; trs.push(Math.max(b.h-b.l,Math.abs(b.h-pb.c),Math.abs(b.l-pb.c))); const upMove=b.h-pb.h, downMove=pb.l-b.l; pDMs.push(upMove>downMove&&upMove>0?upMove:0); mDMs.push(downMove>upMove&&downMove>0?downMove:0); } const atrV=smoothRMA(trs,diLen); const spDM=smoothRMA(pDMs,diLen); const smDM=smoothRMA(mDMs,diLen); const pDI=spDM.map((v,i)=>atrV[i]?v/atrV[i]*100:null); const mDI=smDM.map((v,i)=>atrV[i]?v/atrV[i]*100:null); const dx=pDI.map((v,i)=>pDI[i]!==null&&mDI[i]!==null&&(pDI[i]+mDI[i])>0?Math.abs(pDI[i]-mDI[i])/(pDI[i]+mDI[i])*100:null); const adxV=smoothRMA(dx.filter(v=>v!==null),smooth); const adxPad=new Array(dx.length-adxV.length).fill(null).concat(adxV); return {pDI,mDI,adx:adxPad}; }
function smoothRMA(arr, len) { const filtered=arr.filter(v=>v!==null); if(!filtered.length) return []; const out=[]; let prev=filtered.slice(0,len).reduce((a,b)=>a+b,0)/len; out.push(prev); for(let i=len;i<filtered.length;i++){ prev=(prev*(len-1)+filtered[i])/len; out.push(prev); } return out; }
function supertrend(bars, mult, len) { const atrV=atr(bars,len); const dirs=[], lines=[]; let dir=1, upper=null, lower=null; for(let i=0;i<bars.length;i++){ const hl2=(bars[i].h+bars[i].l)/2; const a=atrV[i]||0; const bu=hl2+mult*a, bl=hl2-mult*a; if(i===0){upper=bu;lower=bl;dirs.push(1);lines.push(bu);continue;} const pu=upper, pl=lower; lower=bl>pl||bars[i-1].c<pl?bl:pl; upper=bu<pu||bars[i-1].c>pu?bu:pu; if(bars[i].c>upper){dir=-1;} else if(bars[i].c<lower){dir=1;} dirs.push(dir); lines.push(dir===1?upper:lower); } return {dirs,lines}; }

// ========== createLiveTicker ==========
async function createLiveTicker() {
  const tickerBar = document.getElementById('liveTicker');
  setInterval(async () => {
    try {
      const res = await fetch(`${WORKER_URL}/api/status`);
      const data = await res.json();
      tickerBar.innerHTML = '';
      CFG.watchlist.slice(0, 8).forEach(sym => {
        const item = document.createElement('div');
        item.className = 'ticker-item';
        item.innerHTML = `<span class="ticker-name">${sym}</span> <span class="price-up">—</span>`;
        tickerBar.appendChild(item);
      });
    } catch(e) {}
  }, 10000);
}

// ========== pollBackendWorker ==========
async function pollBackendWorker() {
  try {
    const res = await fetch(`${WORKER_URL}/api/status`);
    const data = await res.json();
    renderSignalLog(data.signals || []);
    renderNotificationLog();
    renderDailySignals();
    renderAllOpenPositions();
  } catch(e) {}
}

  try { allSignals = JSON.parse(localStorage.getItem('masterai_signals') || '{}'); } catch(e){}
}
function saveAllSignals() {
  localStorage.setItem('masterai_signals', JSON.stringify(allSignals));
}

// ========== loadSettings, saveSettings, openSettings, closeSettings ==========
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('masterai_cfg')||'{}');
    Object.assign(CFG, s);
  } catch(e){}
  document.getElementById('tgToken').value = CFG.tgToken||'';
  document.getElementById('tgChatId').value = CFG.tgChatId||'';
  document.getElementById('groqApiKey').value = CFG.groqApiKey||'';
  document.getElementById('refreshSec').value = CFG.refreshSec||60;
  document.getElementById('s_masterBuyTh').value = CFG.masterBuyTh||0.7;
  document.getElementById('s_masterSellTh').value = CFG.masterSellTh||0.3;
  document.getElementById('s_fusionBuyTh').value = CFG.fusionBuyTh||0.8;
  document.getElementById('s_adxMin').value = CFG.adxMin||25;
  document.getElementById('s_notifications').checked = CFG.notifications !== false;
  document.getElementById('enableSys1').checked = CFG.enableSys1 !== false;
  document.getElementById('enableSys2').checked = CFG.enableSys2 !== false;
  document.getElementById('enableFusion').checked = CFG.enableFusion !== false;
  document.getElementById('enableMaster').checked = CFG.enableMaster !== false;
  document.getElementById('enableAgents').checked = CFG.enableAgents !== false;
  document.getElementById('s_summaryInterval').value = CFG.summaryInterval || 1800;
  document.getElementById('s_watchlist').value = CFG.watchlist.join(',');
  currentTheme = CFG.theme || 'dark';
  applyTheme();
}

function saveSettings() {
  CFG.tgToken = document.getElementById('tgToken').value.trim();
  CFG.tgChatId = document.getElementById('tgChatId').value.trim();
  CFG.groqApiKey = document.getElementById('groqApiKey').value.trim();
  CFG.refreshSec = +document.getElementById('refreshSec').value;
  CFG.masterBuyTh = +document.getElementById('s_masterBuyTh').value;
  CFG.masterSellTh = +document.getElementById('s_masterSellTh').value;
  CFG.fusionBuyTh = +document.getElementById('s_fusionBuyTh').value;
  CFG.adxMin = +document.getElementById('s_adxMin').value;
  CFG.notifications = document.getElementById('s_notifications').checked;
  CFG.enableSys1 = document.getElementById('enableSys1').checked;
  CFG.enableSys2 = document.getElementById('enableSys2').checked;
  CFG.enableFusion = document.getElementById('enableFusion').checked;
  CFG.enableMaster = document.getElementById('enableMaster').checked;
  CFG.enableAgents = document.getElementById('enableAgents').checked;
  CFG.summaryInterval = +document.getElementById('s_summaryInterval').value;
  CFG.watchlist = document.getElementById('s_watchlist').value.split(',').map(s=>s.trim().toUpperCase()).filter(Boolean);

  localStorage.setItem('masterai_cfg', JSON.stringify(CFG));
  renderWatchlist();
}

function openSettings() { loadSettings(); document.getElementById('settingsOverlay').style.display = 'flex'; }
function closeSettings() { document.getElementById('settingsOverlay').style.display = 'none'; }

// ========== checkFirstLaunch & saveInitialWatchlist ==========
function checkFirstLaunch() {
  if (!localStorage.getItem('masterai_firstlaunch')) {
    document.getElementById('watchlistModal').style.display = 'flex';
  }
}
function saveInitialWatchlist() {
  const val = document.getElementById('initialWatchlist').value.trim();
  if (val) {
    CFG.watchlist = val.split(',').map(s => s.trim().toUpperCase()).filter(Boolean);
    localStorage.setItem('masterai_cfg', JSON.stringify(CFG));
    localStorage.setItem('masterai_firstlaunch', 'true');
    document.getElementById('watchlistModal').style.display = 'none';
    renderWatchlist();
  }
}

// ========== toggleTheme & applyTheme ==========
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  CFG.theme = currentTheme;
  applyTheme();
}
function applyTheme() {
  if (currentTheme === 'light') {
    document.documentElement.style.setProperty('--bg', '#f8fafc');
    document.documentElement.style.setProperty('--bg2', '#e2e8f0');
    document.documentElement.style.setProperty('--bg3', '#cbd5e1');
    document.documentElement.style.setProperty('--text', '#0f172a');
    document.getElementById('themeBtn').innerHTML = '☀️';
  } else {
    document.documentElement.style.setProperty('--bg', '#0a0e1a');
    document.documentElement.style.setProperty('--bg2', '#111827');
    document.documentElement.style.setProperty('--bg3', '#1a2235');
    document.documentElement.style.setProperty('--text', '#e2e8f0');
    document.getElementById('themeBtn').innerHTML = '🌙';
  }
}

// ========== exportSignalsCSV ==========
function exportSignalsCSV() {
  let csv = 'Tarih,Sembol,TF,Sistem,Tür,Fiyat,PnL\n';
  Object.keys(allSignals).forEach(key => {
    allSignals[key].forEach(s => {
      const d = new Date(s.t);
      csv += `${d.toLocaleString('tr-TR')},${key.split('-')[0]},${key.split('-')[1]},${s.sys},${s.type},${s.price},${s.pnl||''}\n`;
    });
  });
  const blob = new Blob([csv], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'masterai_signals_v2.3.csv'; a.click();
}

// ========== exportSettings & importSettings ==========
function exportSettings() {
  const data = JSON.stringify(CFG, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'masterai_settings_v2.3.json'; a.click();
}
function importSettings() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = ev => {
      CFG = JSON.parse(ev.target.result);
      saveSettings();
      loadSettings();
      renderWatchlist();
      alert('✅ Ayarlar yüklendi!');
    };
    reader.readAsText(file);
  };
  input.click();
}
